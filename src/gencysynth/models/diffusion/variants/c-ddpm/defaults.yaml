# src/gencysynth/models/diffusion/variants/c-ddpm/defaults.yaml
# GenCyberSynth — Diffusion family — c-DDPM variant — Default hyperparameters
#
# RULE A NOTE:
# -------------
# This file is ONLY default knobs. It does NOT define output folders.
# Run directories are resolved by orchestration using:
#   (dataset_id, model_tag, run_id)  -> artifacts/runs/<dataset_id>/<model_tag>/<run_id>/
#
# The orchestrator or CLI config should specify:
#   dataset.id, model.tag (or let model.tag default), run_meta.seed, paths.data_root, paths.artifacts
#
# You can override any key here from your experiment YAML.

model:
  family: diffusion
  variant: c-ddpm
  tag: diffusion/c-ddpm

# Dataset identity (should be overridden per dataset)
dataset:
  id: ustc-tfc2016

# Run identity metadata (orchestrator will inject run_id if missing)
run_meta:
  seed: 42

# Common paths (override per machine / HPC)
paths:
  artifacts: artifacts
  data_root: USTC-TFC2016_malware

# -------------------------------------------------------------------
# Core data shape
# -------------------------------------------------------------------
IMG_SHAPE: [40, 40, 1]
NUM_CLASSES: 9
VAL_FRACTION: 0.5

# -------------------------------------------------------------------
# Training hyperparameters
# -------------------------------------------------------------------
EPOCHS: 200
BATCH_SIZE: 256
LR: 0.0002
BETA_1: 0.9
PATIENCE: 10
LOG_EVERY: 25

# -------------------------------------------------------------------
# Model architecture
# -------------------------------------------------------------------
BASE_FILTERS: 64
DEPTH: 2
TIME_EMB_DIM: 128

# -------------------------------------------------------------------
# Diffusion schedule (training)
# -------------------------------------------------------------------
TIMESTEPS: 1000
SCHEDULE: linear
BETA_START: 0.0001
BETA_END: 0.02

# -------------------------------------------------------------------
# Synthesis defaults (used by samply.py / sample entrypoint)
# -------------------------------------------------------------------
synth:
  # Balanced budget per class for manifest-based sampling
  n_per_class: 25

# Optional speed knob for preview reverse diffusion (does NOT change training timesteps)
# If your sampler uses DIFFUSION_STEPS / steps_preview, it can default to 200.
DIFFUSION_STEPS: 200