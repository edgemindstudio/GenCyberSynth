# src/gencysynth/models/vae/variants/c_vae/defaults.yaml
# Rule A defaults for cVAE (Conditional VAE).
#
# Key idea:
# - Artifacts are dataset_aware to prevent collisions across multiple datasets.
# - If you set `data.id`, that becomes the folder name under `paths.artifacts/`.
# - If you set `run.name`, artifacts go under an additional runs/<run.name>/ layer.

# -------------------------
# Reproducibility
# -------------------------
SEED: 42

# -------------------------
# Data (dataset identity)
# -------------------------
data:
  # root: folder containing *.npy files (train_data.npy, train_labels.npy, test_data.npy, test_labels.npy)
  root: "USTC_TFC2016_malware"

  # id: stable identifier used in artifact paths
  # If omitted, we derive from basename(data.root).
  id: "ustc_tfc2016"

  # val_fraction: portion of the "test" split re_used as validation by loaders
  val_fraction: 0.5

# Backward_compat aliases (supported by normalize_cfg):
# DATA_DIR: "USTC_TFC2016_malware"

# -------------------------
# Model config
# -------------------------
IMG_SHAPE: [40, 40, 1]
NUM_CLASSES: 9

LATENT_DIM: 100
BETA_KL: 1.0

# -------------------------
# Train config
# -------------------------
EPOCHS: 200
BATCH_SIZE: 256
LR: 0.0002
BETA_1: 0.5

# Optional: logging cadence / early stopping (used by pipeline if you wire it)
LOG_EVERY: null                 # if null, pipeline may compute from epochs
EARLY_STOPPING_PATIENCE: 10

# -------------------------
# Synthesis config
# -------------------------
SAMPLES_PER_CLASS: 1000

# -------------------------
# Run grouping (optional but recommended)
# -------------------------
# run:
#   name: "paper1_ablation_a"

# -------------------------
# Artifact root (Rule A)
# -------------------------
paths:
  artifacts: "artifacts"

# ARTIFACTS:
#   (Normally filled automatically by config.normalize_cfg(). You can override explicitly if needed.)
